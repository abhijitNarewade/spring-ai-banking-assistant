name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test
        run: mvn -B test
      - name: Package
        run: mvn -B -DskipTests package
      - name: Build container image
        run: docker build -t spring-ai-banking-assistant:${{ github.sha }} .
