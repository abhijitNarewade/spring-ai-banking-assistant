server:
  port: 8080

spring:
  application:
    name: spring-ai-banking-assistant
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/banking_ai}
    username: ${SPRING_DATASOURCE_USERNAME:banking_ai}
    password: ${SPRING_DATASOURCE_PASSWORD:banking_ai}
  flyway:
    enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-mini}
          temperature: 0.1
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-latest}
          temperature: 0.1
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: ${EMBEDDING_DIMENSIONS:1536}
        distance-type: COSINE_DISTANCE
        index-type: HNSW

banking-ai:
  security:
    api-key: ${BANKING_ASSISTANT_API_KEY:dev-api-key}
  rag:
    top-k: 5
    similarity-threshold: 0.72
    default-provider: OPENAI
    refusal-message: "I can only answer using approved banking knowledge sources. Please contact the branch or relationship manager for account-specific help."
  guardrails:
    blocked-patterns:
      - "(?i).*\\b(pin|otp|cvv|password|netbanking password)\\b.*"
      - "(?i).*\\b(pan|aadhaar|ssn)\\b.*"
      - "(?i).*\\bguaranteed approval\\b.*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.banking.ai: INFO
